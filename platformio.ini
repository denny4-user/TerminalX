; ================= TerminalX =================
; M5Stack StickS3 (ESP32-S3, 8MB) - IR-first multitool.
; Build:  pio run
; Upload: pio run -t upload
; Web flasher bin is auto-merged to docs/firmware/TerminalX.bin after build.
; =============================================

[platformio]
default_envs = m5stack-sticks3

[env:m5stack-sticks3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = partitions_8mb.csv

build_flags =
	-Os
	-DCORE_DEBUG_LEVEL=0
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1

	; ---- TerminalX pins (M5StickS3) ----
	-DIR_TX_PIN=46
	-DIR_RX_PIN=42
	-DBTN_OK_PIN=11
	-DBTN_NAV_PIN=12
	-DTFT_BL_PIN=38

	; ---- IRremoteESP8266: only what we use (keeps it small) ----
	-D_IR_ENABLE_DEFAULT_=false
	-DSEND_RAW=true
	-DDECODE_HASH=true
	-DDECODE_NEC=true
	-DDECODE_SAMSUNG=true
	-DDECODE_SONY=true
	-DDECODE_RC5=true
	-DDECODE_RC6=true
	-DDECODE_LG=true
	-DDECODE_PANASONIC=true
	-DDECODE_JVC=true

lib_deps =
	m5stack/M5Unified
	https://github.com/bmorcelli/IRremoteESP8266

extra_scripts = post:merge_firmware.py

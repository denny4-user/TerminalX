; ================= TerminalX =================
; M5Stack StickS3 (ESP32-S3, 8MB) - IR-first multitool.
; Build:  pio run
; Upload: pio run -t upload
; Web flasher bin is auto-merged to docs/firmware/TerminalX.bin after build.
; =============================================

[platformio]
default_envs = m5stack-sticks3

[env:m5stack-sticks3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
; DIO, not QIO: the M5StickS3 ROM can't load the 2nd-stage bootloader in QIO
; mode (black screen / TG0WDT bootloop). PlatformIO's USB uploader silently
; downgrades the bootloader to DIO, but the merged web-flasher image does not,
; so QIO here bricks every web flash. DIO boots reliably on this board.
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = partitions_8mb.csv

build_flags =
	-Os
	-DCORE_DEBUG_LEVEL=0
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1

	; ---- WiFi raw injection (Bruce engine): let our ieee80211_raw_frame_
	;      sanity_check override win over the ROM/lib symbol at link time. ----
	-Wl,--allow-multiple-definition

	; ---- TerminalX pins (M5StickS3) ----
	-DIR_TX_PIN=46
	-DIR_RX_PIN=42
	-DBTN_OK_PIN=11
	-DBTN_NAV_PIN=12
	-DTFT_BL_PIN=38

	; ---- IRremoteESP8266: enable ALL protocols (like Bruce's main env) ----
	; (default = all decoders/senders on, incl. DECODE_HASH for raw capture)

lib_deps =
	m5stack/M5Unified
	https://github.com/bmorcelli/IRremoteESP8266

extra_scripts = post:merge_firmware.py
